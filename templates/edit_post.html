<!DOCTYPE html>
<html>
<head>

<title>Edit Post</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<div class="logo">
Blog Portal 🚀
</div>

<div class="nav-links">

<a href="/dashboard">Dashboard</a>

<a href="/posts">View Posts</a>

<a href="/logout">Logout</a>

</div>

</div>

<div class="container">

<div class="card">

<h1>Edit Blog Post ✏️</h1>

<form method="POST">

<input
type="text"
name="title"
value="{{ post[1] }}"
required>

<textarea
name="content"
rows="10"
required>{{ post[2] }}</textarea>

<button type="submit">

Update Post 🚀

</button>

</form>

</div>

</div>

</body>
</html>
